<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="header">
    <div id="logo">&#9654;</div>
    <div id="title">TorBox Streamer</div>
  </div>

  <div id="state-not-imdb" class="state hidden">
    <p class="muted">Open an <strong>IMDb title page</strong> to stream it.</p>
    <p class="muted small">e.g. imdb.com/title/tt0111161</p>
  </div>

  <div id="state-loading" class="state hidden">
    <div class="spinner"></div>
    <p id="loading-text" class="muted">Fetching streams...</p>
  </div>

  <div id="state-error" class="state hidden">
    <p class="error-text">&#9888; <span id="error-text"></span></p>
    <button id="btn-retry" class="btn btn-secondary">Retry</button>
  </div>

  <div id="state-results" class="state hidden">
    <div id="movie-bar">
      <span id="movie-title">Movie Title</span>
      <span id="movie-id" class="muted small">tt0000000</span>
    </div>

    <div id="episode-picker" class="hidden">
      <label>S <input id="inp-season" type="number" min="1" value="1" class="inp-sm"></label>
      <label>E <input id="inp-episode" type="number" min="1" value="1" class="inp-sm"></label>
      <button id="btn-fetch-ep" class="btn btn-small">Go</button>
    </div>

    <div id="stats-bar"></div>
    <div id="stream-list"></div>
  </div>

  <!-- State: file picker -->
  <div id="state-files" class="state hidden">
    <p class="muted">Pick a file to stream:</p>
    <div id="file-list"></div>
    <button id="btn-cancel-files" class="btn btn-secondary">Cancel</button>
  </div>

  <!-- State: streaming -->
  <div id="state-streaming" class="state hidden">
    <div class="success-box">
      <p>&#127916; Streaming in mpv!</p>
      <p id="stream-file" class="muted small"></p>
    </div>
    <button id="btn-delete" class="btn btn-danger">Delete from TorBox</button>
  </div>

  <!-- State: URL only (mpv not found) -->
  <div id="state-url" class="state hidden">
    <p class="muted">mpv not found. Copy the URL:</p>
    <textarea id="url-output" readonly rows="3"></textarea>
    <button id="btn-copy-url" class="btn btn-secondary">Copy URL</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
